services:
  - type: web
    name: marketplace-backend
    runtime: node
    rootDir: backend-marketplace
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: marketplace-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        sync: false

databases:
  - name: marketplace-db
    databaseName: marketplace_db
    plan: free
