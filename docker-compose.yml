services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: marketplace
      POSTGRES_PASSWORD: marketplace123
      POSTGRES_DB: marketplace_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marketplace -d marketplace_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend-marketplace
      target: dev
    restart: unless-stopped
    volumes:
      - ./backend-marketplace/src:/app/src
      - /app/node_modules
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgres://marketplace:marketplace123@db:5432/marketplace_db
      JWT_SECRET: dev_jwt_secret_change_in_production
      NODE_ENV: development
      ALLOWED_ORIGINS: http://localhost:3000
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend-marketplace
      target: dev
    restart: unless-stopped
    volumes:
      - ./frontend-marketplace/src:/app/src
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    environment:
      API_URL: http://backend:3001
      NEXT_PUBLIC_API_URL: http://localhost:3001
    depends_on:
      - backend

  seeder:
    build:
      context: ./backend-marketplace
      target: dev
    command: npm run seed
    environment:
      DATABASE_URL: postgres://marketplace:marketplace123@db:5432/marketplace_db
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - seed

volumes:
  pg_data:
